services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lersha}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lersha}
      POSTGRES_DB: ${POSTGRES_DB:-lersha}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lersha}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_URI: postgresql://${POSTGRES_USER:-lersha}:${POSTGRES_PASSWORD:-lersha}@postgres:5432/${POSTGRES_DB:-lersha}
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ./backend/models:/app/backend/models:ro
      - chroma_data:/app/chroma_db
      - mlruns_data:/app/mlruns
      - ./output:/app/output
      - ./logs:/app/logs

  # ── Streamlit UI ───────────────────────────────────────────────────────────
  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      API_BASE_URL: http://backend:8000

  # ── MLflow ────────────────────────────────────────────────────────────────
  mlflow:
    image: python:3.12-slim
    command: >
      bash -c "pip install mlflow && mlflow server
      --host 0.0.0.0 --port 5000
      --backend-store-uri /mlruns
      --default-artifact-root /mlruns"
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - mlruns_data:/mlruns

volumes:
  postgres_data:
  chroma_data:
  mlruns_data:
