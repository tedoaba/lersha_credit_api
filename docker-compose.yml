services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lersha}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lersha}
      POSTGRES_DB: ${POSTGRES_DB:-lersha}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lersha}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Celery broker + result backend) ─────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_URI: postgresql://${POSTGRES_USER:-lersha}:${POSTGRES_PASSWORD:-lersha}@postgres:5432/${POSTGRES_DB:-lersha}
      MLFLOW_TRACKING_URI: http://mlflow:5000
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend/models:/app/backend/models:ro
      - chroma_data:/app/chroma_db
      - mlruns_data:/app/mlruns
      - ./output:/app/output
      - ./logs:/app/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Celery Worker ──────────────────────────────────────────────────────────
  # Uncomment to run the inference worker as a separate container:
  # worker:
  #   build:
  #     context: .
  #     dockerfile: backend/Dockerfile
  #   command: uv run celery -A backend.worker worker --loglevel=info --concurrency=4
  #   restart: unless-stopped
  #   depends_on:
  #     redis:
  #       condition: service_healthy
  #     postgres:
  #       condition: service_healthy
  #   env_file:
  #     - .env
  #   environment:
  #     DB_URI: postgresql://${POSTGRES_USER:-lersha}:${POSTGRES_PASSWORD:-lersha}@postgres:5432/${POSTGRES_DB:-lersha}
  #     REDIS_URL: redis://redis:6379/0
  #   volumes:
  #     - ./backend/models:/app/backend/models:ro

  # ── Streamlit UI ───────────────────────────────────────────────────────────
  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      API_BASE_URL: http://backend:8000

  # ── MLflow ────────────────────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlruns/mlflow.db
      --default-artifact-root /mlruns
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - mlruns_data:/mlruns

volumes:
  postgres_data:
  chroma_data:
  mlruns_data:
