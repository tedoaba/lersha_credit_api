# docker-compose.yml — BASE SERVICE DEFINITIONS
#
# Pure service skeletons: no env_file, no host ports, no inline secrets.
# Environment and ports are injected by overlay files:
#
#   Dev  (auto-loads override): docker compose up
#   Prod (explicit merge):      docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-lersha}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Celery broker + result backend) ─────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/models:/app/backend/models:ro
      - mlruns_data:/app/mlruns
      - ./output:/app/output
      - ./logs:/app/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Celery Worker ──────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/models:/app/backend/models:ro
      - mlruns_data:/app/mlruns
      - ./output:/app/output
      - ./logs:/app/logs

  # ── Streamlit UI (legacy — kept during migration) ────────────────────────
  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    restart: unless-stopped
    depends_on:
      - backend

  # ── Next.js Frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

  # ── MLflow Tracking Server ─────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    restart: unless-stopped
    volumes:
      - mlruns_data:/mlruns

volumes:
  postgres_data:
  mlruns_data:
