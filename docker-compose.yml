# docker-compose.yml — BASE SERVICE DEFINITIONS
#
# This file defines all service skeletons with no hardcoded env values
# and no host port bindings (moved to docker-compose.override.yml for dev
# or docker-compose.prod.yml for prod).
#
# Dev  (auto-loads override): docker compose up
# Prod (explicit merge):      docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lersha}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lersha}
      POSTGRES_DB: ${POSTGRES_DB:-lersha}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lersha}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Celery broker + result backend) ─────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_URI: postgresql://${POSTGRES_USER:-lersha}:${POSTGRES_PASSWORD:-lersha}@postgres:5432/${POSTGRES_DB:-lersha}
      MLFLOW_TRACKING_URI: http://mlflow:5000
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend/models:/app/backend/models:ro
      - chroma_data:/app/chroma_db
      - mlruns_data:/app/mlruns
      - ./output:/app/output
      - ./logs:/app/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Celery Worker ──────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: uv run celery -A backend.worker worker --loglevel=info --concurrency=4
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_URI: postgresql://${POSTGRES_USER:-lersha}:${POSTGRES_PASSWORD:-lersha}@postgres:5432/${POSTGRES_DB:-lersha}
      MLFLOW_TRACKING_URI: http://mlflow:5000
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend/models:/app/backend/models:ro
      - chroma_data:/app/chroma_db
      - mlruns_data:/app/mlruns
      - ./output:/app/output
      - ./logs:/app/logs

  # ── Streamlit UI ───────────────────────────────────────────────────────────
  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - .env
    environment:
      API_BASE_URL: http://backend:8000

  # ── MLflow Tracking Server ─────────────────────────────────────────────────
  # Dev uses SQLite (overridden in docker-compose.override.yml).
  # Prod uses PostgreSQL backend (overridden in docker-compose.prod.yml).
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    restart: unless-stopped
    volumes:
      - mlruns_data:/mlruns

volumes:
  postgres_data:
  chroma_data:
  mlruns_data:
