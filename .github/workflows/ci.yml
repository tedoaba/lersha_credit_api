name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:  # Allow manual pipeline trigger from any branch

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Ruff — lint check
        run: uv run ruff check backend/

      - name: Ruff — format check (no changes applied)
        run: uv run ruff format --check backend/

      - name: Mypy — static type checking (backend only)
        run: uv run mypy backend/

  # ── Test ────────────────────────────────────────────────────────────────────
  test:
    name: Tests & Coverage (≥ 80%)
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: lersha
          POSTGRES_PASSWORD: lersha
          POSTGRES_DB: test_lersha
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_URI: postgresql://lersha:lersha@localhost:5432/test_lersha
      API_KEY: ci-test-key
      GEMINI_MODEL: gemini-1.5-pro
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      FARMER_DATA_ALL: farmer_data_all
      CHROMA_DB_PATH: /tmp/test_chroma

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Run tests with coverage gate
        run: >-
          uv run pytest backend/tests/
          --cov=backend
          --cov-report=term-missing
          --cov-fail-under=80
          -v

  # ── Frontend Build ──────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build (Next.js)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Next.js frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: http://backend:8000
        run: npm run build

  # ── Backend Docker Build ────────────────────────────────────────────────────
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate compose files (base + prod)
        env:
          POSTGRES_USER: lersha
          POSTGRES_PASSWORD: lersha
          POSTGRES_DB: lersha
          DB_USER: lersha
          DB_PASSWORD: lersha
          API_KEY: ci-placeholder
          GEMINI_MODEL: gemini-1.5-pro
          GEMINI_API_KEY: ci-placeholder
          MLFLOW_S3_BUCKET: ci-placeholder-bucket
          AWS_ACCESS_KEY_ID: ci-placeholder
          AWS_SECRET_ACCESS_KEY: ci-placeholder
          REDIS_URL: redis://redis:6379/0
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml config > /dev/null

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t lersha-backend:ci .

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t lersha-frontend:ci .
