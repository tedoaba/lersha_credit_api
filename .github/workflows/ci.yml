name: CI

on:
  push:
    branches: [main, "001-*", "00*-*"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Run ruff linter
        run: uv run ruff check backend/ ui/

      - name: Run ruff format check
        run: uv run ruff format --check backend/ ui/

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: lersha
          POSTGRES_PASSWORD: lersha
          POSTGRES_DB: lersha_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_URI: postgresql://lersha:lersha@localhost:5432/lersha_test
      API_KEY: test-api-key
      GEMINI_MODEL: gemini-1.5-pro
      GEMINI_API_KEY: test-gemini-key
      FARMER_DATA_ALL: farmer_data_all
      CHROMA_DB_PATH: /tmp/test_chroma

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install all dependencies
        run: uv sync --extra dev

      - name: Run tests with coverage
        run: uv run pytest backend/tests/ --cov=backend --cov-report=xml --cov-fail-under=80 -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t lersha-backend:${{ github.sha }} .

      - name: Build ui image
        run: docker build -f ui/Dockerfile -t lersha-ui:${{ github.sha }} .
