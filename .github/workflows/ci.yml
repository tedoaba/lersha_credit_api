name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Ruff — lint check
        run: uv run ruff check backend/ ui/

      - name: Ruff — format check (no changes applied)
        run: uv run ruff format --check backend/ ui/

      - name: Mypy — static type checking (backend only)
        run: uv run mypy backend/

  # ── Test ────────────────────────────────────────────────────────────────────
  test:
    name: Tests & Coverage (≥ 80%)
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: lersha
          POSTGRES_PASSWORD: lersha
          POSTGRES_DB: test_lersha
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_URI: postgresql://lersha:lersha@localhost:5432/test_lersha
      API_KEY: ci-test-key
      GEMINI_MODEL: gemini-1.5-pro
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      FARMER_DATA_ALL: farmer_data_all
      CHROMA_DB_PATH: /tmp/test_chroma

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Run tests with coverage gate
        run: >-
          uv run pytest backend/tests/
          --cov=backend
          --cov-report=term-missing
          --cov-fail-under=80
          -v

  # ── Build ───────────────────────────────────────────────────────────────────
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t lersha-backend:ci .

      - name: Build UI image
        run: docker build -f ui/Dockerfile -t lersha-ui:ci .
